<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.google.com/specimen/Space+Grotesk" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>

<main class="page">
  
  <!-- ОБЩАЯ КАРТА () -->
  <div class="cards-wrappers">
    
    <!-- ПЕРЕДНЯЯ КАРТА -->
    <div class="card-front">
      <div class='card-logo'></div>
      <div id="Interactive-Card-Number">0000 0000 0000 0000</div>
      <div class="card-front-bottom">
        <div id="Interactive-Card-Name">Jane Appleseed</div>
        <div id="Interactive-Card-Exp-Date">00/00</div>
      </div>
    </div>

    <!-- ЗАДНЯЯ КАРТА -->
    <div class="card-back">
      <div id="Interactive-Card-CVC">000</div>
    </div>

  </div>
  
  <form class="card-details-form" novalidate>

    <div class="form-group">
      
      <label for="cardholder-name">Cardholder Name</label>
      <input type="text" id="cardholder-name" placeholder="e.g. Jane Appleseed" class="form-control-name" required>
      <div id="cardholder-name-error" class="error" aria-live="assertive"></div>
      
      <label for="card-number">Card Number</label>
      <input type="text" id="card-number" placeholder="e.g. 1234 5678 9123 0000" maxlength="19" inputmode="numeric" class="form-control-card-number" required>
      <div id="card-number-error" class="error" aria-live="assertive"></div>

      <div class="form-row">
        
        <div class="form-group-half">
          <label for="exp-date">Exp. Date (MM/YY)</label>
          <div class="exp-date">
            <input type="text" id="exp-month" placeholder="MM" maxlength="2" class="form-control-exp-date" required>
            <input type="text" id="exp-year" placeholder="YY" maxlength="2" class="form-control-exp-date" required>
          </div>
          <div id="exp-date-error" class="error" aria-live="assertive"></div>
        </div>
        
        <div class="form-group-half">
          <label for="cvc">CVC</label>
          <div class="cvc-control">
            <input type="text" id="cvc" placeholder="e.g. 123" maxlength="3" aria-describedby="cvc-error" inputmode="numeric" class="form-control-cvc" required>
            <div id="cvc-error" class="error" aria-live="assertive"></div>
          </div>
        </div>

      </div>

    </div> 

    <button class="form-control-submit" type="submit">Confirm</button>
  
  </form>

 <div class="completed-state is-hidden" aria-live="assertive">
  <img class="complete_icon" src="images\icon-complete.svg">
  <h2>THANK YOU!</h2>
  <p class="text_completed_state">We've added your card details</p>
  <button type="button" id="continue-btn">Continue</button>
</div>

</main>

<script src="index.js" defer></script>

</body>
</html>
